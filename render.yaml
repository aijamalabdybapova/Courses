services:
  - type: web
    name: langlearn
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn myproject.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "langlearn.onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://langlearn.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: langlearn_db
          property: connectionString

databases:
  - name: langlearn_db
    plan: free